<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="url(#shine)"/>

  <!-- Clock face ring -->
  <circle cx="100" cy="100" r="70" stroke="white" stroke-opacity="0.25" stroke-width="2" fill="none"/>

  <!-- Hour tick marks -->
  <g stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round">
    <line x1="100" y1="34" x2="100" y2="42"/>
    <line x1="100" y1="158" x2="100" y2="166"/>
    <line x1="34" y1="100" x2="42" y2="100"/>
    <line x1="158" y1="100" x2="166" y2="100"/>
    <!-- Diagonal ticks -->
    <line x1="135.36" y1="44.64" x2="130.3" y2="51.22"/>
    <line x1="64.64" y1="44.64" x2="69.7" y2="51.22"/>
    <line x1="44.64" y1="135.36" x2="51.22" y2="130.3"/>
    <line x1="155.36" y1="135.36" x2="148.78" y2="130.3"/>
    <line x1="44.64" y1="64.64" x2="51.22" y2="69.7"/>
    <line x1="155.36" y1="64.64" x2="148.78" y2="69.7"/>
    <line x1="135.36" y1="155.36" x2="130.3" y2="148.78"/>
    <line x1="64.64" y1="155.36" x2="69.7" y2="148.78"/>
  </g>

  <!-- Clock hands -->
  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="100" y1="100" x2="72" y2="68" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2 o'clock) -->
  <line x1="100" y1="100" x2="130" y2="58" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Second hand accent -->
  <line x1="100" y1="100" x2="100" y2="150" stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="5" fill="white"/>

  <!-- Bottom log lines (timesheet motif) -->
  <g stroke="white" stroke-opacity="0.6" stroke-width="2.5" stroke-linecap="round">
    <line x1="68" y1="148" x2="132" y2="148"/>
    <line x1="74" y1="156" x2="126" y2="156"/>
  </g>
</svg>
