<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="60%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="barC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="barD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- Subtle background circles -->
  <circle cx="480" cy="120" r="180" fill="#7C3AED" fill-opacity="0.15"/>
  <circle cx="80" cy="680" r="200" fill="#4F46E5" fill-opacity="0.12"/>

  <!-- ── MAIN CARD: Weekly Overview ── -->
  <g transform="translate(60, 120)" filter="url(#shadow)">
    <rect width="340" height="220" rx="20" fill="url(#card1)" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
    <!-- Card header -->
    <text x="24" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white" fill-opacity="0.5" letter-spacing="1.5">WEEKLY OVERVIEW</text>
    <text x="24" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white">32.5 hrs</text>
    <text x="24" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" fill-opacity="0.5">Apr 13 — Apr 19</text>

    <!-- Bar chart -->
    <!-- Mon -->
    <rect x="30" y="198" width="28" height="0" rx="4" fill="url(#barA)"/>
    <rect x="30" y="148" width="28" height="50" rx="4" fill="url(#barA)"/>
    <text x="44" y="214" font-family="system-ui" font-size="10" fill="white" fill-opacity="0.4" text-anchor="middle">M</text>

    <!-- Tue -->
    <rect x="72" y="128" width="28" height="70" rx="4" fill="url(#barA)"/>
    <text x="86" y="214" font-family="system-ui" font-size="10" fill="white" fill-opacity="0.4" text-anchor="middle">T</text>

    <!-- Wed -->
    <rect x="114" y="138" width="28" height="60" rx="4" fill="url(#barA)"/>
    <text x="128" y="214" font-family="system-ui" font-size="10" fill="white" fill-opacity="0.4" text-anchor="middle">W</text>

    <!-- Thu -->
    <rect x="156" y="143" width="28" height="55" rx="4" fill="url(#barA)"/>
    <text x="170" y="214" font-family="system-ui" font-size="10" fill="white" fill-opacity="0.4" text-anchor="middle">T</text>

    <!-- Fri -->
    <rect x="198" y="153" width="28" height="45" rx="4" fill="url(#barA)"/>
    <text x="212" y="214" font-family="system-ui" font-size="10" fill="white" fill-opacity="0.4" text-anchor="middle">F</text>

    <!-- Sat -->
    <rect x="240" y="178" width="28" height="20" rx="4" fill="url(#barA)" fill-opacity="0.5"/>
    <text x="254" y="214" font-family="system-ui" font-size="10" fill="white" fill-opacity="0.4" text-anchor="middle">S</text>

    <!-- Sun -->
    <rect x="282" y="188" width="28" height="10" rx="4" fill="url(#barA)" fill-opacity="0.3"/>
    <text x="296" y="214" font-family="system-ui" font-size="10" fill="white" fill-opacity="0.4" text-anchor="middle">S</text>
  </g>

  <!-- ── SMALL CARD: Projects ── -->
  <g transform="translate(60, 372)" filter="url(#shadow2)">
    <rect width="220" height="170" rx="18" fill="url(#card1)" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
    <text x="20" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white" fill-opacity="0.5" letter-spacing="1.5">PROJECTS</text>

    <!-- Project rows -->
    <!-- Gazyva -->
    <circle cx="20" cy="60" r="5" fill="#6EE7B7"/>
    <text x="34" y="64" font-family="system-ui" font-size="13" fill="white" fill-opacity="0.85">Gazyva</text>
    <text x="190" y="64" font-family="system-ui" font-size="13" fill="white" fill-opacity="0.6" text-anchor="end">12h</text>
    <!-- Bar -->
    <rect x="20" y="72" width="182" height="3" rx="2" fill="white" fill-opacity="0.08"/>
    <rect x="20" y="72" width="110" height="3" rx="2" fill="#6EE7B7"/>

    <!-- Administration -->
    <circle cx="20" cy="106" r="5" fill="#A78BFA"/>
    <text x="34" y="110" font-family="system-ui" font-size="13" fill="white" fill-opacity="0.85">Admin</text>
    <text x="190" y="110" font-family="system-ui" font-size="13" fill="white" fill-opacity="0.6" text-anchor="end">9h</text>
    <rect x="20" y="118" width="182" height="3" rx="2" fill="white" fill-opacity="0.08"/>
    <rect x="20" y="118" width="82" height="3" rx="2" fill="#A78BFA"/>

    <!-- Thera -->
    <circle cx="20" cy="150" r="5" fill="#FCD34D"/>
    <text x="34" y="154" font-family="system-ui" font-size="13" fill="white" fill-opacity="0.85">Thera</text>
    <text x="190" y="154" font-family="system-ui" font-size="13" fill="white" fill-opacity="0.6" text-anchor="end">7h</text>
    <rect x="20" y="162" width="182" height="3" rx="2" fill="white" fill-opacity="0.08"/>
    <rect x="20" y="162" width="64" height="3" rx="2" fill="#FCD34D"/>
  </g>

  <!-- ── FLOATING STAT CARD ── -->
  <g transform="translate(300, 390)" filter="url(#shadow2)">
    <rect width="160" height="75" rx="16" fill="url(#card1)" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
    <text x="16" y="28" font-family="system-ui" font-size="11" fill="white" fill-opacity="0.5" letter-spacing="1">DAYS LOGGED</text>
    <text x="16" y="58" font-family="system-ui" font-size="32" font-weight="700" fill="white">5</text>
    <text x="60" y="58" font-family="system-ui" font-size="13" fill="white" fill-opacity="0.4">of 7</text>
  </g>

  <!-- ── BOTTOM CARD: Today's log ── -->
  <g transform="translate(100, 575)" filter="url(#shadow2)">
    <rect width="400" height="130" rx="18" fill="url(#card1)" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
    <text x="22" y="34" font-family="system-ui" font-size="11" font-weight="600" fill="white" fill-opacity="0.5" letter-spacing="1.5">TODAY · APR 18</text>

    <!-- Row 1 -->
    <rect x="22" y="50" width="4" height="28" rx="2" fill="#A78BFA"/>
    <text x="36" y="64" font-family="system-ui" font-size="13" fill="white" fill-opacity="0.85">Gazyva</text>
    <text x="370" y="64" font-family="system-ui" font-size="13" font-weight="600" fill="white" text-anchor="end">3.5h</text>
    <text x="36" y="78" font-family="system-ui" font-size="11" fill="white" fill-opacity="0.4">9:00 AM – 12:30 PM</text>

    <!-- Divider -->
    <line x1="22" y1="92" x2="378" y2="92" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

    <!-- Row 2 -->
    <rect x="22" y="102" width="4" height="22" rx="2" fill="#6EE7B7"/>
    <text x="36" y="116" font-family="system-ui" font-size="13" fill="white" fill-opacity="0.85">Administration</text>
    <text x="370" y="116" font-family="system-ui" font-size="13" font-weight="600" fill="white" text-anchor="end">1.0h</text>
    <text x="36" y="130" font-family="system-ui" font-size="11" fill="white" fill-opacity="0.4">1:00 PM – 2:00 PM</text>
  </g>
</svg>
